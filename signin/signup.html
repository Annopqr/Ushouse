<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/53a8c415f1.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./signup.css">
</head>
<body>
    <div class="wrap">
        <div class="signup">
            <h2>회원가입</h2>
            
            <div class="signup_name">
                <h4>이름</h4>
                <input type="text" name="" id="" placeholder="이름을 입력하세요">
            </div>

            <div class="signup_id">
                <h4>ID</h4>
                <input type="text" name="" id="" placeholder="ID를 입력하세요">
            </div>

            <div class="signup_pw">
                <h4>Password</h4>
                <input type="password" name="" id="" placeholder="비밀번호를 입력하세요">
            </div>

            <div class="signup_pw_confirm">
                <h4>Password 확인</h4>
                <input type="password" name="" id="" placeholder="비밀번호를 다시 한번 입력하세요">
            </div>

            <div class="signup_email">
                <h4>이메일</h4>
                <input type="email" name="" id="" placeholder="이메일을 입력하세요">
            </div>

            <div class="signup_phone">
                <h4>휴대폰 번호</h4>
                <input type="tel" name="" id="" placeholder="휴대폰 번호를 입력하세요">
                <button id="send-code">인증번호 받기</button>
              </div>

              <div class="signup_code">
                <h4>인증번호</h4>
                <input type="text" name="" id="" placeholder="인증번호를 입력하세요">
                <button id="verify-code">인증하기</button>
              </div>
              
              <div class="signup_etc1">
                <div class="checkbox">
                  <input type="checkbox" name="" id=""> 이용약관에 동의합니다.
                  <button id="view-terms">보기</button>
                </div>
              </div>
              
              <div class="signup_etc2">
                <div class="checkbox">
                  <input type="checkbox" name="" id=""> 개인정보 수집 및 이용에 대한 안내에 동의합니다.
                  <button id="view-terms">보기</button>
                </div>
              </div>

            <div class="submit">
                <input type="submit" value="회원가입">
            </div>
        </div>
    </div>
</body>
</html>
